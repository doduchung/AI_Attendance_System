<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        AI Attendance System
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f5f5f5;
        }

        .main-box{
            background:white;
            border-radius:20px;
            padding:30px;
            margin-top:30px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        .camera-box{
            border-radius:20px;
            overflow:hidden;
            border:5px solid #198754;
        }

        h1{
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="main-box">

        <h1 class="text-center text-success mb-4">
            Hệ thống điểm danh bằng Camera AI
        </h1>

        <div class="row">

            <div class="col-md-8">

                <div class="camera-box">

                    <img
                        src="{{ url_for('video_feed') }}"
                        width="100%"
                    >

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow p-3">

                    <h3 class="text-success">
                        Thông Tin Hệ Thống
                    </h3>

                    <hr>

                    <p>
                        ✅ AI Face Recognition
                    </p>

                    <p>
                        ✅ Điểm danh tự động
                    </p>

                    <p>
                        ✅ Xuất Excel
                    </p>

                    <p>
                        ✅ Giọng nói tiếng Việt
                    </p>

                    <p>
                        ✅ Chống điểm danh trùng
                    </p>

                    <hr>

                    <button class="btn btn-success w-100">
                        Hệ thống đang hoạt động
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
