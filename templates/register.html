<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        Register Student
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f5f5f5;
        }

        .main-box{
            background:white;
            padding:30px;
            border-radius:20px;
            margin-top:40px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        h1{
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="main-box">

        <h1 class="text-success mb-4">
            Đăng Ký Học Sinh
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Nhập tên học sinh
                </label>

                <input
                    type="text"
                    name="student_name"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-success"
            >
                Đăng Ký Khuôn Mặt
            </button>

            <a
                href="/attendance"
                class="btn btn-secondary"
            >
                Quay Lại
            </a>

        </form>

        {% if message %}

        <div
            class="alert alert-success mt-4"
        >

            {{ message }}

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
