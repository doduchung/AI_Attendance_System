<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>
        Students Management
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f5f5f5;
        }

        .sidebar{
            height:100vh;
            background:#198754;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            font-weight:bold;
            margin-bottom:30px;
        }

        .menu-btn{
            width:100%;
            margin-bottom:15px;
            text-align:left;
        }

        .main-content{
            padding:20px;
        }

        .card-box{
            border-radius:20px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar">

            <h2>
                AI Attendance
            </h2>

            <a
                href="/"
                class="btn btn-light menu-btn"
            >
                Trang Chủ
            </a>

            <a
                href="/attendance"
                class="btn btn-light menu-btn"
            >
                Điểm Danh
            </a>

            <a
                href="/register"
                class="btn btn-light menu-btn"
            >
                Đăng Ký Học Sinh
            </a>

            <a
                href="/students"
                class="btn btn-warning menu-btn"
            >
                Danh Sách Học Sinh
            </a>

        </div>

        <!-- MAIN -->

        <div class="col-md-10 main-content">

            <h1 class="text-success mb-4">
                Danh Sách Học Sinh
            </h1>

            <div class="row">

                {% for student in students %}

                <div class="col-md-4 mb-4">

                    <div
                        class="card shadow p-3 card-box"
                    >

                        <h3 class="text-success">
                            {{ student.name }}
                        </h3>

                        <hr>

                        <p>
                            📷 Số ảnh:
                            <b>
                                {{ student.total_images }}
                            </b>
                        </p>

                        <form
                            method="POST"
                            action="/delete_student"
                        >

                            <input
                                type="hidden"
                                name="student_name"
                                value="{{ student.folder }}"
                            >

                            <button
                                class="btn btn-danger w-100"
                            >
                                Xóa Học Sinh
                            </button>

                        </form>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

    </div>

</div>

</body>

</html>
